name: Oracle Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: oracle-updater
  cancel-in-progress: false

jobs:
  update-oracle:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: updater/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install updater dependencies
        run: npm ci
        working-directory: updater

      - name: Write updater keypair
        env:
          UPDATER_KEYPAIR_JSON: ${{ secrets.UPDATER_KEYPAIR_JSON }}
        run: |
          test -n "$UPDATER_KEYPAIR_JSON"
          printf '%s' "$UPDATER_KEYPAIR_JSON" > updater/keypair.json

      - name: Write runtime environment file
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          PROGRAM_ID: ${{ secrets.PROGRAM_ID }}
          PYTH_HTTP_URL: ${{ secrets.PYTH_HTTP_URL }}
          ORACLE_AUTHORITY: ${{ secrets.ORACLE_AUTHORITY }}
          SOLANA_MAINNET_RPC_URL: ${{ secrets.SOLANA_MAINNET_RPC_URL }}
          MSOL_RISK_STATE_PDA: ${{ secrets.MSOL_RISK_STATE_PDA }}
          JITOSOL_RISK_STATE_PDA: ${{ secrets.JITOSOL_RISK_STATE_PDA }}
          BSOL_RISK_STATE_PDA: ${{ secrets.BSOL_RISK_STATE_PDA }}
        run: |
          cat > .env <<EOF
          SOLANA_RPC_URL=${SOLANA_RPC_URL}
          PROGRAM_ID=${PROGRAM_ID}
          UPDATER_KEYPAIR_PATH=./updater/keypair.json
          PYTH_HTTP_URL=${PYTH_HTTP_URL:-https://hermes.pyth.network}
          ORACLE_AUTHORITY=${ORACLE_AUTHORITY}
          SOLANA_MAINNET_RPC_URL=${SOLANA_MAINNET_RPC_URL:-https://api.mainnet-beta.solana.com}
          MSOL_RISK_STATE_PDA=${MSOL_RISK_STATE_PDA}
          JITOSOL_RISK_STATE_PDA=${JITOSOL_RISK_STATE_PDA}
          BSOL_RISK_STATE_PDA=${BSOL_RISK_STATE_PDA}
          EOF

      - name: Run micro tests
        run: python -m unittest tests.test_core_engine -v

      - name: Update all tracked LSTs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bridge/data core-engine/output artifacts

          PRIMARY_LST_ID="mSOL-v2"
          while IFS=':' read -r LST_ASSET LST_ID; do
            BRIDGE_OUT="${GITHUB_WORKSPACE}/bridge/data/latest_raw.${LST_ID}.json"
            CORE_OUT="${GITHUB_WORKSPACE}/core-engine/output/latest.${LST_ID}.json"
            SNAPSHOT_OUT="${GITHUB_WORKSPACE}/artifacts/oracle_state.${LST_ID}.json"
            BRIDGE_CACHE="${GITHUB_WORKSPACE}/artifacts/bridge_cache.${LST_ID}.json"

            if [[ -f "${BRIDGE_CACHE}" ]]; then
              cp "${BRIDGE_CACHE}" "${BRIDGE_OUT}"
            fi

            python bridge/fetch_pyth.py \
              --asset "${LST_ASSET}" \
              --lst-id "${LST_ID}" \
              --lookback-seconds 6000 \
              --step-seconds 300 \
              --output "${BRIDGE_OUT}"

            python core-engine/pipeline.py \
              --input "${BRIDGE_OUT}" \
              --output "${CORE_OUT}"

            cp "${BRIDGE_OUT}" "${BRIDGE_CACHE}"

            if [[ "${LST_ID}" == "${PRIMARY_LST_ID}" ]]; then
              python scripts/sync_artifacts.py \
                --oracle-input "${CORE_OUT}" \
                --bridge-input "${BRIDGE_OUT}" \
                --output "${GITHUB_WORKSPACE}/artifacts/oracle_state.json" \
                --write-asset-alias \
                --skip-simulation
            else
              python scripts/sync_artifacts.py \
                --oracle-input "${CORE_OUT}" \
                --bridge-input "${BRIDGE_OUT}" \
                --output "${SNAPSHOT_OUT}" \
                --skip-simulation
            fi

            BRIDGE_HISTORY_SOURCE="$(python -c 'import json, sys; from pathlib import Path; print(json.loads(Path(sys.argv[1]).read_text(encoding="utf-8")).get("history_source", "unknown"))' "${BRIDGE_OUT}")"
            if [[ "${BRIDGE_HISTORY_SOURCE}" == *fallback* ]]; then
              echo "Skipping on-chain submit for ${LST_ID}: history source ${BRIDGE_HISTORY_SOURCE} is not trusted."
              continue
            fi

            npm --prefix updater run submit -- "${CORE_OUT}"
          done <<'EOF'
          mSOL:mSOL-v2
          jitoSOL:jitoSOL-v1
          bSOL:bSOL-v1
          EOF

      - name: Regenerate simulation outputs
        run: python simulation/stress_test.py

      - name: Refresh primary oracle artifacts
        run: |
          python scripts/sync_artifacts.py \
            --oracle-input "${GITHUB_WORKSPACE}/core-engine/output/latest.mSOL-v2.json" \
            --bridge-input "${GITHUB_WORKSPACE}/bridge/data/latest_raw.mSOL-v2.json" \
            --output "${GITHUB_WORKSPACE}/artifacts/oracle_state.json" \
            --write-asset-alias

      - name: Commit refreshed oracle artifacts
        continue-on-error: true
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f artifacts/oracle_state.json artifacts/oracle_state.*.json artifacts/bridge_cache.*.json artifacts/stress_scenario.json
          if git diff --cached --quiet; then
            echo "No oracle artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh oracle artifacts"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; retrying after rebase."
            sleep 5
          done
          echo "Failed to push refreshed artifacts after 3 attempts; leaving workflow green because oracle update already completed."
